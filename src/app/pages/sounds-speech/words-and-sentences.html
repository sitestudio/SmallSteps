<div class="content-wrapper">
  <a routerLink="/sounds-speech" class="back-link">← Back to Sounds and Speech</a>

  <!-- Animal Icon Display -->
  @if (selectedAnimal) {
    <div class="animal-display">
      <img [src]="'/icons/' + selectedAnimal.svgName + '.svg'" 
           [alt]="selectedAnimal.name" 
           class="selected-animal-icon">
      <p class="animal-name-display">Playing with {{ selectedAnimal.name }}!</p>
    </div>
  }

  <header>
    <h1>Words and Sentences</h1>
    <p>Teacher Assessment Checklist</p>
  </header>

  <!-- Assessment Checklist - Centered -->
  <section class="checklist-section">
    <ul class="checklist">
      @for (item of checklistItems; track item.id) {
        <li class="checklist-item" [class.expanded]="expandedItem === item.id">
          <div class="item-main">
            <label class="checkbox-container">
              <input type="checkbox" [checked]="isItemChecked(item.id)" (click)="handleCheck($event, item.id)">
              <span class="checkmark"></span>
            </label>
            <div class="item-text" (click)="toggleExpand(item.id)">
              {{ item.text }}
              <span class="chevron"></span>
            </div>
          </div>
          <div class="description">
            <div class="description-content">{{ item.description }}</div>
          </div>
        </li>
      }
    </ul>
  </section>

  <!-- Action Buttons - Centered -->
  <div class="action-buttons-center">
    <button (click)="generatePDF()" class="btn btn-primary">Generate PDF</button>
    <button (click)="printPage()" class="btn btn-secondary">Print</button>
  </div>

  <!-- Bottom Navigation -->
  <footer class="bottom-nav">
    <button (click)="navigateBack()" class="btn btn-back">← Back</button>
    <button (click)="navigateToHome()" class="btn btn-home">🏠 Home</button>
  </footer>

  <!-- Dark Mode Toggle -->
  <div class="dark-mode-float">
    <button (click)="toggleDarkMode()" class="dark-mode-toggle">/{{ isDarkMode() ? '☀️' : '🌙' }}</button>
  </div>
</div>

<nav class="bottom-nav">
  <button (click)="navigateToHome()" class="nav-btn nav-home">🏠 Home</button>
  <button (click)="navigateBack()" class="nav-btn nav-back">← Back</button>
</nav>

<router-outlet></router-outlet>
